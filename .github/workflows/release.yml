name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: ai-login-switcher-linux-x64
            binary_path: dist/ai-login-switcher
            archive_name: ai-login-switcher-linux-x64.tar.gz
          - os: windows-latest
            artifact_name: ai-login-switcher-windows-x64
            binary_path: dist/ai-login-switcher.exe
            archive_name: ai-login-switcher-windows-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build binary
        run: |
          pyinstaller --clean ai-login-switcher.spec

      - name: Smoke test Linux
        if: runner.os == 'Linux'
        run: |
          chmod +x dist/ai-login-switcher
          ./dist/ai-login-switcher status || true

      - name: Smoke test Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\dist\ai-login-switcher.exe status

      - name: Package Linux archive
        if: runner.os == 'Linux'
        run: |
          chmod +x dist/ai-login-switcher
          tar -czf "${{ matrix.archive_name }}" -C dist ai-login-switcher

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ matrix.binary_path }}" -DestinationPath "${{ matrix.archive_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

  auto-tag:
    name: Create release tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.next-tag.outputs.tag_name }}

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create next minor version tag
        id: next-tag
        shell: bash
        run: |
          set -euo pipefail

          latest_tag=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)

          if [[ -z "$latest_tag" ]]; then
            next_tag="v0.1.0"
          else
            version=${latest_tag#v}
            IFS=. read -r major minor patch <<< "$version"
            next_tag="v${major}.$((minor + 1)).0"
          fi

          while git rev-parse -q --verify "refs/tags/${next_tag}" >/dev/null; do
            version=${next_tag#v}
            IFS=. read -r major minor patch <<< "$version"
            next_tag="v${major}.$((minor + 1)).0"
          done

          git tag -a "$next_tag" -m "Release $next_tag"
          git push origin "$next_tag"
          echo "tag_name=$next_tag" >> "$GITHUB_OUTPUT"

  release:
    name: Publish GitHub Release
    if: >-
      always() &&
      needs.build.result == 'success' &&
      (
        startsWith(github.ref, 'refs/tags/v') ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.auto-tag.result == 'success')
      )
    needs:
      - build
      - auto-tag
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show files
        run: |
          find release-assets -maxdepth 3 -type f -print

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.auto-tag.outputs.tag_name || github.ref_name }}
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.zip
          generate_release_notes: true
